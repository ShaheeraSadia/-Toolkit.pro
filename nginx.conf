server {
    listen 3000;
    server_name localhost;

    # Gzip Compression for high performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Root folder for build files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Crucial for SPA Router (React Router, etc.) history-based routing
        try_files $uri $uri/ /index.html;
    }

    # Custom caching and headers for static resource assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|eot|ttf|otf|json)$ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Error handling page redirects
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
